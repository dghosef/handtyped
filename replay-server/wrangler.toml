name = "handtyped-replay"
main = "./worker.js"
compatibility_date = "2026-03-31"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[kv_namespaces]]
binding = "SESSIONS"
preview_id = "84b38853a7e14fd69eb6c890431ac621"
id = "52b7e89885c146029acaa1184f90a409"

[[d1_databases]]
binding = "EDU_DB"
database_name = "handtyped-edu"
database_id = "924d9d36-9465-4ba3-a026-d46b8289239f"
preview_database_id = "924d9d36-9465-4ba3-a026-d46b8289239f"

[[routes]]
pattern = "replay.handtyped.app"
custom_domain = true

[[routes]]
pattern = "handtyped.app"
custom_domain = true

[[routes]]
pattern = "www.handtyped.app"
custom_domain = true

[[routes]]
pattern = "edu.handtyped.app"
custom_domain = true
