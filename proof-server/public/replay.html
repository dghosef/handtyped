<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HumanProof — Typing Replay</title>
  <style>
    /* Full beautiful replay viewer styles */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo { font-size: 18px; font-weight: 700; color: #7c83ff; letter-spacing: -0.02em; }
    .badge {
      background: #16c784;
      color: #000;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .session-meta { margin-left: auto; font-size: 12px; color: rgba(255,255,255,0.4); }

    .main { display: flex; flex: 1; min-height: 0; gap: 0; }

    /* Stats sidebar */
    .sidebar {
      width: 240px;
      background: rgba(255,255,255,0.03);
      border-right: 1px solid rgba(255,255,255,0.08);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.3);
      margin-bottom: 8px;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .stat-value { font-size: 28px; font-weight: 700; color: #7c83ff; line-height: 1; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 3px; }
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-mini { background: rgba(255,255,255,0.04); border-radius: 6px; padding: 8px 10px; }
    .stat-mini .stat-value { font-size: 18px; }

    /* Authenticity score */
    .auth-score {
      background: linear-gradient(135deg, rgba(124,131,255,0.15), rgba(22,199,132,0.15));
      border: 1px solid rgba(124,131,255,0.3);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .auth-score-value { font-size: 48px; font-weight: 800; color: #16c784; line-height: 1; }
    .auth-score-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .auth-score-detail { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 6px; line-height: 1.4; }

    /* Rhythm chart */
    .rhythm-chart {
      height: 40px;
      display: flex;
      align-items: flex-end;
      gap: 1px;
    }
    .rhythm-bar {
      flex: 1;
      background: rgba(124,131,255,0.6);
      border-radius: 1px 1px 0 0;
      min-height: 2px;
      transition: background 0.1s;
    }
    .rhythm-bar.active { background: #7c83ff; }

    /* Document replay area */
    .doc-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .controls {
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .play-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #7c83ff;
      border: none;
      color: white;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .play-btn:hover { background: #9099ff; }

    .progress-wrap {
      flex: 1;
      position: relative;
      height: 20px;
      display: flex;
      align-items: center;
    }
    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      cursor: pointer;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: #7c83ff;
      border-radius: 2px;
      transition: width 0.05s linear;
    }
    .progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
    }

    .time-display { font-size: 12px; color: rgba(255,255,255,0.4); font-variant-numeric: tabular-nums; min-width: 90px; }

    .speed-select {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }

    .doc-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    .doc-page {
      width: 100%;
      max-width: 720px;
      background: white;
      color: #111;
      border-radius: 4px;
      padding: 72px 80px;
      min-height: 400px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.4);
      font-size: 12pt;
      font-family: "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      position: relative;
    }
    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: #2563eb;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Status */
    #status-msg {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* Verification badge */
    .verified-banner {
      background: rgba(22, 199, 132, 0.1);
      border: 1px solid rgba(22, 199, 132, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .verified-icon { font-size: 16px; }
    .verified-text strong { color: #16c784; display: block; font-size: 13px; }
    .verified-text span { color: rgba(255,255,255,0.4); font-size: 11px; }

    /* Pause visualization */
    .pause-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: rgba(255,200,0,0.6);
      border-radius: 50%;
      vertical-align: middle;
      margin: 0 1px;
      position: relative;
    }
  </style>
</head>
<body>
<header>
  <div class="logo">HumanProof</div>
  <div class="badge">&#10003; Verified</div>
  <div class="session-meta" id="session-date">Loading...</div>
</header>

<div class="main">
  <div class="sidebar">
    <div>
      <div class="sidebar-title">Authenticity</div>
      <div class="auth-score">
        <div class="auth-score-value" id="auth-score">--</div>
        <div class="auth-score-label">Human Score</div>
        <div class="auth-score-detail" id="auth-detail">Analyzing typing patterns...</div>
      </div>
    </div>

    <div>
      <div class="sidebar-title">Verified</div>
      <div class="verified-banner">
        <div class="verified-icon">&#128272;</div>
        <div class="verified-text">
          <strong>Hardware Attested</strong>
          <span>Built-in keyboard only</span>
        </div>
      </div>
    </div>

    <div>
      <div class="sidebar-title">Stats</div>
      <div class="stat-grid">
        <div class="stat-mini">
          <div class="stat-value" id="stat-wpm">--</div>
          <div class="stat-label">avg WPM</div>
        </div>
        <div class="stat-mini">
          <div class="stat-value" id="stat-words">--</div>
          <div class="stat-label">words</div>
        </div>
        <div class="stat-mini">
          <div class="stat-value" id="stat-keystrokes">--</div>
          <div class="stat-label">keystrokes</div>
        </div>
        <div class="stat-mini">
          <div class="stat-value" id="stat-corrections">--</div>
          <div class="stat-label">corrections</div>
        </div>
      </div>
    </div>

    <div>
      <div class="sidebar-title">Typing Rhythm</div>
      <div class="rhythm-chart" id="rhythm-chart"></div>
      <div style="font-size:10px;color:rgba(255,255,255,0.25);margin-top:4px;">keystroke density over time</div>
    </div>

    <div>
      <div class="sidebar-title">Pause Analysis</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.4);line-height:1.6;" id="pause-analysis">
        Loading...
      </div>
    </div>
  </div>

  <div class="doc-area">
    <div class="controls">
      <button class="play-btn" id="btn-play">&#9654;</button>
      <div class="progress-wrap">
        <div class="progress-track" id="progress-track">
          <div class="progress-fill" id="progress-fill" style="width:0%"></div>
          <div class="progress-thumb" id="progress-thumb" style="left:0%"></div>
        </div>
      </div>
      <div class="time-display" id="time-display">0:00 / 0:00</div>
      <select class="speed-select" id="speed-select">
        <option value="0.5">0.5&times;</option>
        <option value="1" selected>1&times;</option>
        <option value="2">2&times;</option>
        <option value="5">5&times;</option>
        <option value="10">10&times;</option>
        <option value="50">50&times;</option>
      </select>
    </div>
    <div class="doc-scroll">
      <div class="doc-page" id="doc-page">
        <span id="doc-content"></span><span class="cursor-blink" id="cursor"></span>
      </div>
    </div>
    <div id="status-msg">Loading session...</div>
  </div>
</div>

<script>
// ── Replay Engine ─────────────────────────────────────────────────────────

const sessionId = location.pathname.split('/').pop()
let session = null
let history = [] // [{t, text}]
let playing = false
let speed = 1
let currentIdx = 0
let animFrame = null
let replayStartTime = null
let sessionStartTime = null

async function loadSession() {
  try {
    const res = await fetch(`/api/sessions/${sessionId}`)
    if (!res.ok) throw new Error('Session not found')
    session = await res.json()

    // Build history from doc_history
    history = (session.doc_history || []).sort((a, b) => a.t - b.t)
    if (history.length === 0) {
      // Fallback: just show final content
      history = [{ t: Date.now(), text: session.doc_text || '' }]
    }

    document.getElementById('session-date').textContent =
      `Recorded ${new Date(session.created_at).toLocaleDateString()} at ${new Date(session.created_at).toLocaleTimeString()}`

    populateStats()
    buildRhythmChart()
    analyzePauses()
    computeAuthScore()

    document.getElementById('status-msg').textContent = 'Press \u25b6 to replay'
    document.getElementById('doc-content').textContent = ''
    updateProgress(0)
  } catch (e) {
    document.getElementById('status-msg').textContent = `Error: ${e.message}`
  }
}

function populateStats() {
  const words = session.doc_text ? session.doc_text.trim().split(/\s+/).filter(Boolean).length : 0
  document.getElementById('stat-words').textContent = words
  document.getElementById('stat-keystrokes').textContent = (session.keystroke_count || 0).toLocaleString()

  // WPM: words / (total time in minutes)
  if (history.length > 1) {
    const totalMs = history[history.length - 1].t - history[0].t
    const totalMin = totalMs / 60000
    const wpm = totalMin > 0 ? Math.round(words / totalMin) : 0
    document.getElementById('stat-wpm').textContent = wpm
  }

  // Count corrections (backspace-like: text got shorter)
  let corrections = 0
  for (let i = 1; i < history.length; i++) {
    if (history[i].text.length < history[i-1].text.length) corrections++
  }
  document.getElementById('stat-corrections').textContent = corrections
}

function buildRhythmChart() {
  if (history.length < 2) return
  const chart = document.getElementById('rhythm-chart')
  const BUCKETS = 40
  const totalDuration = history[history.length - 1].t - history[0].t
  const bucketSize = totalDuration / BUCKETS
  const counts = new Array(BUCKETS).fill(0)

  for (let i = 1; i < history.length; i++) {
    const t = history[i].t - history[0].t
    const bucket = Math.min(BUCKETS - 1, Math.floor(t / bucketSize))
    counts[bucket]++
  }

  const maxCount = Math.max(...counts, 1)
  chart.innerHTML = counts.map((c, i) =>
    `<div class="rhythm-bar" style="height:${Math.max(4, Math.round(c/maxCount*100))}%" data-bucket="${i}"></div>`
  ).join('')
}

function analyzePauses() {
  if (history.length < 2) {
    document.getElementById('pause-analysis').textContent = 'Not enough data'
    return
  }
  const gaps = []
  for (let i = 1; i < history.length; i++) {
    gaps.push(history[i].t - history[i-1].t)
  }
  const longPauses = gaps.filter(g => g > 3000).length  // >3s
  const medPauses = gaps.filter(g => g > 500 && g <= 3000).length
  const avgGap = gaps.reduce((a,b) => a+b, 0) / gaps.length

  document.getElementById('pause-analysis').innerHTML = `
    <div>Avg gap: <strong style="color:#7c83ff">${Math.round(avgGap)}ms</strong></div>
    <div>Short pauses (0.5-3s): <strong style="color:#7c83ff">${medPauses}</strong></div>
    <div>Long pauses (>3s): <strong style="color:#7c83ff">${longPauses}</strong></div>
    <div style="margin-top:6px;font-size:10px;color:rgba(255,255,255,0.25);">Natural pause distribution indicates human authorship</div>
  `
}

function computeAuthScore() {
  if (history.length < 3) {
    document.getElementById('auth-score').textContent = '--'
    document.getElementById('auth-detail').textContent = 'Not enough data'
    return
  }

  const gaps = []
  for (let i = 1; i < history.length; i++) gaps.push(history[i].t - history[i-1].t)

  // Signals for human typing:
  // 1. Variance in inter-key intervals (AI paste = 0 variance)
  const avg = gaps.reduce((a,b)=>a+b,0)/gaps.length
  const variance = gaps.reduce((s,g) => s + Math.pow(g-avg,2), 0) / gaps.length
  const cv = Math.sqrt(variance) / avg  // coefficient of variation

  // 2. Corrections (backspaces)
  let corrections = 0
  for (let i = 1; i < history.length; i++) {
    if (history[i].text.length < history[i-1].text.length) corrections++
  }
  const correctionRate = corrections / history.length

  // 3. Burst patterns (natural typing has bursts)
  const hasBursts = gaps.some(g => g < 100) && gaps.some(g => g > 500)

  // Score computation
  let score = 0
  if (cv > 0.5) score += 35  // high timing variance = human
  else if (cv > 0.2) score += 20
  if (correctionRate > 0.05) score += 25  // corrections = human
  else if (correctionRate > 0.01) score += 15
  if (hasBursts) score += 25
  if (history.length > 10) score += 15  // enough data
  score = Math.min(99, score)

  document.getElementById('auth-score').textContent = score
  document.getElementById('auth-detail').textContent =
    score > 70 ? 'Strong indicators of human authorship' :
    score > 40 ? 'Moderate indicators of human authorship' :
    'Insufficient typing data to confirm'

  document.getElementById('auth-score').style.color =
    score > 70 ? '#16c784' : score > 40 ? '#f0a500' : '#ff6b6b'
}

// ── Playback ───────────────────────────────────────────────────────────────

function getTotalDuration() {
  if (history.length < 2) return 1000
  return history[history.length - 1].t - history[0].t
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000)
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`
}

function updateProgress(idx) {
  const total = getTotalDuration()
  const elapsed = idx > 0 ? history[Math.min(idx, history.length-1)].t - history[0].t : 0
  const pct = total > 0 ? (elapsed / total * 100) : 0
  document.getElementById('progress-fill').style.width = pct + '%'
  document.getElementById('progress-thumb').style.left = pct + '%'
  document.getElementById('time-display').textContent =
    `${formatTime(elapsed)} / ${formatTime(total)}`

  // Update rhythm chart highlight
  const BUCKETS = 40
  const bucket = Math.floor(pct / 100 * BUCKETS)
  document.querySelectorAll('.rhythm-bar').forEach((el, i) => {
    el.classList.toggle('active', i === bucket)
  })
}

function renderFrame(idx) {
  if (idx >= history.length) {
    // Done
    const content = document.getElementById('doc-content')
    content.textContent = history[history.length - 1]?.text || ''
    document.getElementById('cursor').style.display = 'none'
    document.getElementById('status-msg').textContent = 'Replay complete'
    document.getElementById('btn-play').textContent = '\u21ba'
    playing = false
    updateProgress(history.length - 1)
    return
  }

  document.getElementById('doc-content').textContent = history[idx].text
  document.getElementById('cursor').style.display = ''
  updateProgress(idx)
}

function startPlay() {
  if (history.length === 0) return
  playing = true
  document.getElementById('btn-play').textContent = '\u23f8'
  document.getElementById('status-msg').textContent = 'Playing...'

  // Reset if at end
  if (currentIdx >= history.length - 1) currentIdx = 0

  const startIdx = currentIdx
  const startHistoryTime = history[startIdx].t
  replayStartTime = performance.now()

  function tick() {
    if (!playing) return

    const elapsed = (performance.now() - replayStartTime) * speed
    const targetTime = startHistoryTime + elapsed

    // Find the last history entry with t <= targetTime
    let newIdx = startIdx
    while (newIdx < history.length - 1 && history[newIdx + 1].t <= targetTime) {
      newIdx++
    }

    currentIdx = newIdx
    renderFrame(currentIdx)

    if (currentIdx >= history.length - 1) return // done

    animFrame = requestAnimationFrame(tick)
  }

  animFrame = requestAnimationFrame(tick)
}

function pausePlay() {
  playing = false
  if (animFrame) cancelAnimationFrame(animFrame)
  document.getElementById('btn-play').textContent = '\u25b6'
  document.getElementById('status-msg').textContent = 'Paused'
}

document.getElementById('btn-play').addEventListener('click', () => {
  const btnText = document.getElementById('btn-play').textContent
  if (btnText === '\u21ba') {
    currentIdx = 0
    document.getElementById('cursor').style.display = ''
    startPlay()
  } else if (playing) {
    pausePlay()
  } else {
    startPlay()
  }
})

document.getElementById('speed-select').addEventListener('change', e => {
  speed = parseFloat(e.target.value)
  if (playing) {
    pausePlay()
    startPlay()
  }
})

document.getElementById('progress-track').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect()
  const pct = (e.clientX - rect.left) / rect.width
  const total = getTotalDuration()
  const targetTime = history[0].t + pct * total

  let idx = 0
  while (idx < history.length - 1 && history[idx + 1].t <= targetTime) idx++
  currentIdx = idx

  if (playing) {
    pausePlay()
    renderFrame(currentIdx)
  } else {
    renderFrame(currentIdx)
  }
})

// ── Init ──────────────────────────────────────────────────────────────────
loadSession()
</script>
</body>
</html>
