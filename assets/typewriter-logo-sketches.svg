<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1200" fill="#F6F1EB"/>
  <style>
    .title { font: 700 28px Georgia, serif; fill: #2E2624; }
    .label { font: 700 20px Georgia, serif; fill: #2E2624; }
    .caption { font: 16px Georgia, serif; fill: #6D6461; }
    .panel { fill: #FFFDF9; stroke: #D7C8BE; stroke-width: 2; rx: 28; }
    .ink { stroke: #2E2624; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    .fill-ink { fill: #2E2624; }
    .accent { stroke: #B65A47; fill: #B65A47; }
    .paper { fill: #FFFDF9; stroke: #2E2624; stroke-width: 10; }
    .muted { stroke: #6D6461; }
  </style>

  <text x="90" y="80" class="title">Typewriter Logo Sketches</text>

  <g transform="translate(70 120)">
    <rect class="panel" width="440" height="300" rx="28"/>
    <text x="28" y="42" class="label">1. Typebar</text>
    <text x="28" y="270" class="caption">Document + cursor. Cleanest product icon.</text>
    <rect x="120" y="84" width="180" height="120" rx="18" class="paper"/>
    <line x1="210" y1="110" x2="210" y2="180" class="ink accent"/>
    <line x1="152" y1="132" x2="188" y2="132" class="ink muted" stroke-width="8"/>
    <line x1="230" y1="132" x2="270" y2="132" class="ink muted" stroke-width="8"/>
    <line x1="152" y1="160" x2="188" y2="160" class="ink muted" stroke-width="8"/>
    <line x1="230" y1="160" x2="270" y2="160" class="ink muted" stroke-width="8"/>
  </g>

  <g transform="translate(580 120)">
    <rect class="panel" width="440" height="300" rx="28"/>
    <text x="28" y="42" class="label">2. Keystamp</text>
    <text x="28" y="270" class="caption">Keycap merged with a seal motif.</text>
    <rect x="118" y="92" width="150" height="110" rx="24" class="paper"/>
    <text x="166" y="161" class="label" style="font-size:44px;">T</text>
    <circle cx="282" cy="178" r="46" fill="#B65A47"/>
    <path d="M260 178l16 16 30-34" class="ink" stroke="#FFFDF9"/>
  </g>

  <g transform="translate(1090 120)">
    <rect class="panel" width="440" height="300" rx="28"/>
    <text x="28" y="42" class="label">3. Built-in Keyboard</text>
    <text x="28" y="270" class="caption">Matches the hardware-gated story.</text>
    <rect x="95" y="90" width="240" height="116" rx="24" class="paper"/>
    <g fill="#2E2624">
      <rect x="122" y="116" width="24" height="18" rx="4"/>
      <rect x="154" y="116" width="24" height="18" rx="4"/>
      <rect x="186" y="116" width="24" height="18" rx="4"/>
      <rect x="218" y="116" width="24" height="18" rx="4"/>
      <rect x="250" y="116" width="24" height="18" rx="4"/>
      <rect x="282" y="116" width="24" height="18" rx="4"/>
      <rect x="138" y="144" width="24" height="18" rx="4"/>
      <rect x="170" y="144" width="24" height="18" rx="4"/>
      <rect x="202" y="144" width="24" height="18" rx="4"/>
      <rect x="234" y="144" width="24" height="18" rx="4"/>
      <rect x="266" y="144" width="24" height="18" rx="4"/>
      <rect x="186" y="172" width="88" height="18" rx="6" fill="#B65A47"/>
    </g>
  </g>

  <g transform="translate(70 470)">
    <rect class="panel" width="440" height="300" rx="28"/>
    <text x="28" y="42" class="label">4. Carriage Mark</text>
    <text x="28" y="270" class="caption">Abstract typewriter body, less literal.</text>
    <path d="M112 188h210c34 0 50-14 50-42v-18c0-28-16-42-50-42H140l-28 28v32" class="ink"/>
    <path d="M130 188v26h174v-26" class="ink"/>
    <circle cx="168" cy="150" r="10" class="fill-ink"/>
    <circle cx="206" cy="150" r="10" class="fill-ink"/>
    <circle cx="244" cy="150" r="10" class="fill-ink"/>
    <circle cx="282" cy="150" r="10" class="fill-ink"/>
    <line x1="332" y1="92" x2="332" y2="150" class="ink accent"/>
  </g>

  <g transform="translate(580 470)">
    <rect class="panel" width="440" height="300" rx="28"/>
    <text x="28" y="42" class="label">5. Proof Sheet</text>
    <text x="28" y="270" class="caption">Document lines + human fingerprint hint.</text>
    <rect x="122" y="80" width="176" height="140" rx="16" class="paper"/>
    <line x1="150" y1="114" x2="270" y2="114" class="ink muted" stroke-width="8"/>
    <line x1="150" y1="138" x2="250" y2="138" class="ink muted" stroke-width="8"/>
    <line x1="150" y1="162" x2="270" y2="162" class="ink muted" stroke-width="8"/>
    <path d="M327 188c0-30-22-53-54-53-28 0-50 20-50 47 0 18 12 33 30 38" class="ink accent" stroke-width="9"/>
    <path d="M336 204c-8-41-33-68-67-68-19 0-33 9-42 22" class="ink accent" stroke-width="7"/>
    <path d="M314 214c-10-24-28-40-49-40-10 0-20 4-28 11" class="ink accent" stroke-width="6"/>
  </g>

  <g transform="translate(1090 470)">
    <rect class="panel" width="440" height="300" rx="28"/>
    <text x="28" y="42" class="label">6. Monogram T</text>
    <text x="28" y="270" class="caption">Brand-forward app icon if you keep Typewriter.</text>
    <path d="M140 100h190" class="ink"/>
    <path d="M235 100v110" class="ink accent"/>
    <path d="M162 210h146" class="ink"/>
    <path d="M184 210v26h102v-26" class="ink"/>
    <circle cx="192" cy="158" r="8" class="fill-ink"/>
    <circle cx="220" cy="158" r="8" class="fill-ink"/>
    <circle cx="248" cy="158" r="8" class="fill-ink"/>
    <circle cx="276" cy="158" r="8" class="fill-ink"/>
  </g>

  <g transform="translate(70 820)">
    <rect class="panel" width="440" height="300" rx="28"/>
    <text x="28" y="42" class="label">7. Replay Pulse</text>
    <text x="28" y="270" class="caption">Leans into typing rhythm and replay.</text>
    <rect x="104" y="86" width="150" height="120" rx="18" class="paper"/>
    <line x1="130" y1="116" x2="228" y2="116" class="ink muted" stroke-width="8"/>
    <line x1="130" y1="142" x2="214" y2="142" class="ink muted" stroke-width="8"/>
    <path d="M240 176h24l18-44 18 74 18-56 18 26h34" class="ink accent"/>
  </g>

  <g transform="translate(580 820)">
    <rect class="panel" width="440" height="300" rx="28"/>
    <text x="28" y="42" class="label">8. Keyhole Cursor</text>
    <text x="28" y="270" class="caption">Verification without a generic shield icon.</text>
    <path d="M228 94c-30 0-54 24-54 54 0 18 8 33 20 43v37h68v-37c12-10 20-25 20-43 0-30-24-54-54-54z" class="ink"/>
    <rect x="221" y="114" width="14" height="60" rx="7" fill="#B65A47"/>
    <circle cx="228" cy="148" r="22" class="ink muted" stroke-width="8"/>
  </g>

  <g transform="translate(1090 820)">
    <rect class="panel" width="440" height="300" rx="28"/>
    <text x="28" y="42" class="label">9. Byline</text>
    <text x="28" y="270" class="caption">Editorial wordmark direction, softer and premium.</text>
    <line x1="108" y1="182" x2="332" y2="182" class="ink muted" stroke-width="6"/>
    <text x="112" y="168" class="label" style="font-size:54px; letter-spacing:2px;">TYPEWRITER</text>
    <line x1="282" y1="98" x2="282" y2="146" class="ink accent"/>
  </g>
</svg>
