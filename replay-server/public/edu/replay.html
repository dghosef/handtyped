<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handtyped EDU Replay</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #ffffff;
      --page: #f5f5f5;
      --ink: #1f1f1f;
      --muted: #666666;
      --accent: #2f6fed;
      --accent-dark: #2558bb;
      --timeline-inactive: #b94d46;
      --timeline-inactive-dark: #923631;
      --timeline-inactive-bg: #efe5e1;
      --timeline-jump: #d39a21;
      --timeline-jump-dark: #8b6400;
      --line: #dddddd;
    }

    body {
      font-family: 'Open Sans', Arial, sans-serif;
      color: var(--ink);
      background: var(--page);
      line-height: 1.45;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }

    .content {
      max-width: 880px;
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      gap: 16px;
    }

    .brand-mark {
      width: 72px;
      height: 72px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    h1 {
      font-size: 34px;
      line-height: 1.15;
      font-weight: 650;
      letter-spacing: -0.02em;
      font-family: 'Open Sans', Arial, sans-serif;
      margin: 0 0 14px;
    }

    .intro {
      font-size: 15px;
      line-height: 1.5;
      color: var(--muted);
      margin: 0 0 8px;
    }

    .share-row {
      display: flex;
      gap: 12px;
      margin: 16px 0 22px;
      flex-wrap: wrap;
      align-items: center;
    }

    .share-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      line-height: 1;
      font-family: inherit;
      padding: 10px 14px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background .15s ease, color .15s ease, border-color .15s ease;
    }

    .share-btn.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .share-btn:hover {
      background: #f7f7f7;
      border-color: #cfcfcf;
    }

    .share-btn.primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    p {
      font-size: 15px;
      color: #333333;
      margin: 0 0 16px;
      line-height: 1.65;
    }

    .replay-shell {
      margin: 18px 0 28px;
    }

    .replay-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px 16px;
      margin: 0 0 8px;
      color: var(--muted);
    }

    .replay-time {
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .replay-caption {
      margin: 0 0 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .replay-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 0 12px;
      flex-wrap: nowrap;
      font-size: 14px;
      color: var(--muted);
    }

    .play-btn, .speed-select {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 6px;
      font-family: inherit;
    }

    .play-btn {
      cursor: pointer;
      min-width: 52px;
    }

    .progress-wrap {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .progress-track {
      height: 10px;
      background: #e5e5e5;
      position: relative;
      cursor: pointer;
      border-radius: 999px;
      overflow: hidden;
      touch-action: none;
    }

    .progress-track.inactive {
      background: var(--timeline-inactive-bg);
    }

    .progress-track.inactive .progress-fill {
      background: var(--timeline-inactive);
    }

    .progress-track.inactive .progress-thumb {
      background: var(--timeline-inactive-dark);
    }

    .timeline-key {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
      font-size: 11px;
      color: var(--muted);
      align-items: center;
      justify-content: flex-end;
    }

    .timeline-key-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .timeline-key-swatch {
      display: inline-block;
      width: 14px;
      height: 8px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .timeline-key-swatch.inactive {
      background: linear-gradient(180deg, rgba(185, 77, 70, 0.55), rgba(146, 54, 49, 0.72));
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      position: relative;
      z-index: 0;
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 14px;
      height: 14px;
      background: var(--accent-dark);
      border-radius: 999px;
      transform: translate(-50%, -50%);
      z-index: 2;
    }

    .progress-gap-markers {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .progress-gap-marker {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 4px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, #f4d27a 0%, var(--timeline-jump) 100%);
      border: 1px solid var(--timeline-jump-dark);
      border-radius: 999px;
    }

    .progress-inactive-spans {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .progress-inactive-span {
      position: absolute;
      top: 0;
      bottom: 0;
      background: linear-gradient(180deg, rgba(185, 77, 70, 0.52), rgba(146, 54, 49, 0.72));
    }

    .time-display {
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .replay-status {
      font-size: 14px;
      color: var(--muted);
      padding: 0 0 12px;
    }

    .replay-stage {
      padding: 0 0 14px;
    }

    .event-jumps {
      margin: 0 0 18px;
      border: 1px solid var(--line);
      background: var(--paper);
      padding: 16px;
    }

    .event-jumps h2 {
      font-size: 16px;
      line-height: 1.3;
      margin: 0 0 12px;
    }

    .event-jump-list {
      display: grid;
      gap: 8px;
    }

    .event-jump {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      border: 1px solid var(--line);
      background: var(--page);
      padding: 10px 12px;
      font: inherit;
      color: inherit;
      text-align: left;
      cursor: pointer;
    }

    .event-jump strong {
      display: block;
      font-size: 14px;
      line-height: 1.35;
      margin-bottom: 2px;
    }

    .event-jump span {
      font-size: 12px;
      color: var(--muted);
    }

    .replay-stage-scroll {
      max-height: min(70vh, 840px);
      overflow: auto;
      border-radius: 2px;
    }

    .doc-page {
      background: var(--paper);
      border: 1px solid #e7e7e7;
      min-height: 520px;
      padding: 36px 38px;
      font-size: 17px;
      line-height: 1.72;
      color: #222222;
      font-family: 'Open Sans', Arial, sans-serif;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .cursor-blink {
      display: inline-block;
      width: 2px;
      height: 1.1em;
      background: var(--accent-dark);
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .metadata-row {
      display: flex;
      gap: 16px;
      margin: 12px 0;
      font-size: 14px;
      color: var(--muted);
    }

    .metadata-item {
      display: flex;
      gap: 6px;
    }

    .metadata-label {
      font-weight: 600;
    }

    body.embed {
      background: transparent;
      overflow: hidden;
    }

    body.embed .page {
      max-width: none;
      padding: 0;
      margin: 0;
      height: 100vh;
    }

    body.embed .content {
      max-width: none;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body.embed .brand,
    body.embed .intro,
    body.embed .share-row,
    body.embed .keyboard-note,
    body.embed .replay-status,
    body.embed .replay-meta {
      display: none;
    }

    body.embed .replay-shell {
      margin: 0;
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body.embed .replay-controls {
      padding: 0 0 8px;
    }

    body.embed .replay-stage {
      padding: 0;
      flex: 1;
      overflow: hidden;
    }

    body.embed .replay-stage-scroll {
      max-height: none;
      height: 100%;
    }

    body.embed .doc-page {
      min-height: 100%;
      height: 100%;
    }

    @media (max-width: 840px) {
      .page { padding-inline: 14px; }
      h1 { font-size: 32px; }
      .doc-page {
        min-height: 440px;
        padding: 24px 20px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="content">
      <div class="brand">
        <a href="https://handtyped.app">
          <img class="brand-mark" src="/handtyped-icon.png" alt="Handtyped" />
        </a>
        <h1 id="headline">Writing Session Replay</h1>
      </div>

      <div class="intro" id="session-date">Loading session…</div>

      <div class="metadata-row">
        <div class="metadata-item">
          <span class="metadata-label">Student:</span>
          <span id="student-name">-</span>
        </div>
        <div class="metadata-item">
          <span class="metadata-label">Assignment:</span>
          <span id="assignment-title">-</span>
        </div>
        <div class="metadata-item">
          <span class="metadata-label">Course:</span>
          <span id="course">-</span>
        </div>
      </div>

      <div class="share-row">
        <button class="share-btn" id="btn-copy-link">Copy Replay Link</button>
      </div>

      <div class="replay-meta">
        <div class="timeline-key" aria-label="Timeline legend">
          <span class="timeline-key-item">
            <span class="timeline-key-swatch inactive" aria-hidden="true"></span>Inactive
          </span>
        </div>
      </div>
      <div class="replay-caption">Replaying keystrokes from this assignment session.</div>
      <div class="replay-time" id="replay-time">PST</div>

      <div class="replay-shell">
        <div class="replay-controls">
          <button class="play-btn" id="btn-play">▶</button>
          <div class="progress-wrap">
            <div class="progress-track" id="progress-track">
              <div class="progress-inactive-spans" id="progress-inactive-spans"></div>
              <div class="progress-gap-markers" id="progress-gap-markers"></div>
              <div class="progress-fill" id="progress-fill"></div>
              <div class="progress-thumb" id="progress-thumb"></div>
            </div>
          </div>
          <div class="time-display" id="time-display">0:00 / 0:00</div>
          <select class="speed-select" id="speed-select">
            <option value="0.5">0.5×</option>
            <option value="1" selected>1×</option>
            <option value="2">2×</option>
            <option value="5">5×</option>
            <option value="10">10×</option>
            <option value="25">25×</option>
            <option value="50">50×</option>
            <option value="500">500×</option>
          </select>
        </div>
        <div class="replay-status" id="status-msg">Loading session…</div>
        <section class="event-jumps">
          <h2>Jump to key moments</h2>
          <div class="event-jump-list" id="event-jump-list">
            <div class="replay-status">Loading replay events…</div>
          </div>
        </section>
        <div class="replay-stage">
          <div class="replay-stage-scroll" id="replay-stage-scroll">
            <div class="doc-page">
              <span id="doc-content"></span>
              <span class="cursor-blink" id="cursor"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import {
      compressIdleGaps,
      findHistoryIndex,
      getDurationFromHistory,
      getDurationFromKeydowns,
      parseHistory,
      parseKeydowns,
      parseFocusEvents,
      buildInactiveSpans,
      buildTimelineGapMarkers,
      formatAbsoluteReplayTime,
      getFocusStateAtElapsedMs,
      compressedTimeForRawMs,
    } from '/replay-view.js'

    const sessionId = location.pathname.split('/').pop()
    const isEmbed = new URLSearchParams(location.search).has('embed')

    if (isEmbed) {
      document.body.classList.add('embed')
    }

    let session = null
    let history = []
    let focusEvents = []
    let replayFocusEvents = []
    let inactiveSpans = []
    let gapMarkers = []
    let keydowns = []
    let playing = false
    let speed = 1
    let currentElapsedMs = 0
    let replayStartTime = null
    let animationHandle = null

    const docContentEl = document.getElementById('doc-content')
    const cursorEl = document.getElementById('cursor')
    const statusMsgEl = document.getElementById('status-msg')
    const playBtnEl = document.getElementById('btn-play')
    const replayTimeEl = document.getElementById('replay-time')
    const progressTrackEl = document.getElementById('progress-track')
    const progressInactiveSpansEl = document.getElementById('progress-inactive-spans')
    const progressGapMarkersEl = document.getElementById('progress-gap-markers')
    const eventJumpListEl = document.getElementById('event-jump-list')
    const speedSelectEl = document.getElementById('speed-select')

    function readSelectedSpeed() {
      const selectedSpeed = Number.parseFloat(speedSelectEl?.value)
      return Number.isFinite(selectedSpeed) && selectedSpeed > 0 ? selectedSpeed : 1
    }

    speed = readSelectedSpeed()

    function getTotalDuration() {
      const historyDuration = getDurationFromHistory(history)
      if (historyDuration > 0) {
        return Math.max(historyDuration, 1000)
      }
      return Math.max(getDurationFromKeydowns(keydowns), 1000)
    }

    function formatTime(ms) {
      const seconds = Math.floor(ms / 1000)
      return `${Math.floor(seconds / 60)}:${String(seconds % 60).padStart(2, '0')}`
    }

    function renderGapMarkers() {
      if (!progressGapMarkersEl) return
      progressGapMarkersEl.innerHTML = ''

      const total = getTotalDuration()
      if (total <= 0 || !gapMarkers.length) return

      for (const marker of gapMarkers) {
        const left = Math.max(0, Math.min(100, (marker.end / total) * 100))
        const el = document.createElement('span')
        el.className = 'progress-gap-marker'
        el.style.left = `${left}%`
        progressGapMarkersEl.appendChild(el)
      }
    }

    function renderInactiveSpans() {
      if (!progressInactiveSpansEl) return
      progressInactiveSpansEl.innerHTML = ''

      const total = getTotalDuration()
      if (total <= 0 || !inactiveSpans.length) return

      for (const span of inactiveSpans) {
        const left = Math.max(0, Math.min(100, (span.start / total) * 100))
        const width = Math.max(0, ((span.end - span.start) / total) * 100)
        if (width <= 0) continue

        const el = document.createElement('span')
        el.className = 'progress-inactive-span'
        el.style.left = `${left}%`
        el.style.width = `${width}%`
        progressInactiveSpansEl.appendChild(el)
      }
    }

    function renderAt(elapsedMs) {
      const total = getTotalDuration()
      currentElapsedMs = Math.max(0, Math.min(elapsedMs, total))
      const idx = findHistoryIndex(history, currentElapsedMs)
      const text = idx >= 0 ? history[idx]?.text || '' : ''
      docContentEl.textContent = text
      cursorEl.style.display = currentElapsedMs >= total ? 'none' : ''

      const focusState = getFocusStateAtElapsedMs(replayFocusEvents, currentElapsedMs)
      progressTrackEl.classList.toggle('inactive', focusState === 'inactive')

      if (currentElapsedMs >= total) {
        playing = false
        playBtnEl.textContent = '▶'
        statusMsgEl.textContent = 'Replay complete'
      }

      updateProgress(currentElapsedMs)
    }

    function renderBlankState() {
      docContentEl.textContent = ''
      cursorEl.style.display = ''
      playBtnEl.textContent = '▶'
      statusMsgEl.textContent = 'Press ▶ to replay'
      updateProgress(0)
    }

    function buildReplayHighlights() {
      const highlights = []
      for (const event of replayFocusEvents) {
        const state = String(event.state || '').toLowerCase()
        if (state && state !== 'focused' && state !== 'foreground') {
          highlights.push({
            t: event.t,
            title: 'Focus changed',
            detail: `Student became ${state.replaceAll('-', ' ')}`,
          })
        }
      }

      for (const visit of session?.url_history || []) {
        if (!visit?.url) continue
        highlights.push({
          t: compressedTimeForRawMs(history, visit.t),
          title: 'Browser navigation',
          detail: visit.url,
        })
      }

      for (const violation of session?.violations || []) {
        highlights.push({
          t: compressedTimeForRawMs(history, violation.t),
          title: 'Violation',
          detail: violation.detail || violation.kind || 'Policy event',
        })
      }

      let previousTextLength = 0
      for (const entry of history) {
        const nextLength = (entry.text || '').length
        const delta = Math.abs(nextLength - previousTextLength)
        if (delta >= 120) {
          highlights.push({
            t: entry.t,
            title: 'Large text jump',
            detail: `Document changed by about ${delta} characters.`,
          })
        }
        previousTextLength = nextLength
      }

      return highlights
        .filter((item) => Number.isFinite(item.t))
        .sort((a, b) => a.t - b.t)
        .filter((item, index, items) => {
          const previous = items[index - 1]
          return !previous || Math.abs(previous.t - item.t) > 800 || previous.title !== item.title
        })
        .slice(0, 12)
    }

    function renderEventJumps() {
      const highlights = buildReplayHighlights()
      if (!highlights.length) {
        eventJumpListEl.innerHTML = '<div class="replay-status">No focus, browser, or violation events were recorded.</div>'
        return
      }
      eventJumpListEl.innerHTML = ''
      for (const item of highlights) {
        const button = document.createElement('button')
        button.type = 'button'
        button.className = 'event-jump'
        button.innerHTML = `
          <div>
            <strong>${item.title}</strong>
            <span>${item.detail}</span>
          </div>
          <span>${formatTime(item.t)}</span>
        `
        button.addEventListener('click', () => {
          seekTo(item.t)
        })
        eventJumpListEl.appendChild(button)
      }
    }

    function updateProgress(elapsedMs) {
      const total = getTotalDuration()
      const pct = total > 0 ? (elapsedMs / total) * 100 : 0
      document.getElementById('progress-fill').style.width = pct + '%'
      document.getElementById('progress-thumb').style.left = pct + '%'
      document.getElementById('time-display').textContent = `${formatTime(elapsedMs)} / ${formatTime(total)}`
    }

    function startPlay() {
      if (!history.length) return
      cancelAnimationFrame(animationHandle)

      if (currentElapsedMs >= getTotalDuration()) {
        currentElapsedMs = 0
      }

      playing = true
      playBtnEl.textContent = '❚❚'
      statusMsgEl.textContent = 'Playing…'
      replayStartTime = performance.now()
      const baseElapsed = currentElapsedMs

      const tick = () => {
        if (!playing) return
        const elapsed = baseElapsed + (performance.now() - replayStartTime) * speed
        renderAt(elapsed)
        if (elapsed >= getTotalDuration()) {
          playing = false
          playBtnEl.textContent = '▶'
          return
        }
        animationHandle = requestAnimationFrame(tick)
      }

      animationHandle = requestAnimationFrame(tick)
    }

    function pausePlay(status = 'Paused') {
      playing = false
      cancelAnimationFrame(animationHandle)
      animationHandle = null
      playBtnEl.textContent = '▶'
      statusMsgEl.textContent = status
    }

    async function loadSession() {
      try {
        const res = await fetch(`/api/edu/replays/${sessionId}`)
        if (!res.ok) throw new Error('Session not found')
        session = await res.json()

        document.getElementById('student-name').textContent = session.student_name || '-'
        document.getElementById('assignment-title').textContent = session.assignment_title || '-'
        document.getElementById('course').textContent = session.course || '-'
        document.getElementById('headline').textContent = 
          session.assignment_title ? `${session.assignment_title} - ${session.student_name}` : 'Writing Session Replay'

        const dateStr = session.last_activity_at || session.updated_at || ''
        if (dateStr) {
          const date = new Date(dateStr)
          if (!Number.isNaN(date.getTime())) {
            const formatted = date.toLocaleDateString('en-US', { 
              month: 'short', 
              day: 'numeric', 
              year: 'numeric',
              hour: 'numeric',
              minute: '2-digit'
            })
            document.getElementById('session-date').textContent = formatted
          }
        }

        keydowns = parseKeydowns(session.keystroke_log || '')
        focusEvents = parseFocusEvents(session)

        const rawHistory = parseHistory(
          {
            doc_history: session.document_history || [],
            doc_text: session.current_text || '',
          },
          keydowns,
        )
        history = compressIdleGaps(rawHistory)

        replayFocusEvents = focusEvents.map(event => ({
          ...event,
          t: compressedTimeForRawMs(history, event.t),
        }))

        const totalDuration = getDurationFromHistory(history)
        inactiveSpans = buildInactiveSpans(focusEvents, history, totalDuration)
        gapMarkers = buildTimelineGapMarkers(history, 15000)

        renderInactiveSpans()
        renderGapMarkers()
        renderEventJumps()

        renderBlankState()
        startPlay()
      } catch (error) {
        statusMsgEl.textContent = `Error: ${error.message}`
      }
    }

    playBtnEl.addEventListener('click', () => {
      if (playing) {
        pausePlay()
      } else {
        startPlay()
      }
    })

    speedSelectEl.addEventListener('change', () => {
      speed = readSelectedSpeed()
      if (playing) {
        pausePlay('Playing…')
        startPlay()
      }
    })

    function seekTo(targetElapsed) {
      const total = getTotalDuration()
      const wasPlaying = playing

      cancelAnimationFrame(animationHandle)
      animationHandle = null
      playing = false

      renderAt(targetElapsed)

      if (wasPlaying && currentElapsedMs < total) {
        startPlay()
      } else if (currentElapsedMs >= total) {
        playing = false
        playBtnEl.textContent = '▶'
      } else {
        playBtnEl.textContent = '▶'
      }

      statusMsgEl.textContent = 'Replay position updated.'
    }

    function elapsedFromClientX(clientX) {
      const rect = progressTrackEl.getBoundingClientRect()
      const pct = rect.width > 0 ? (clientX - rect.left) / rect.width : 0
      return Math.max(0, Math.min(1, pct)) * getTotalDuration()
    }

    progressTrackEl.addEventListener('pointerdown', event => {
      if (event.button !== 0 && event.pointerType !== 'touch') return
      const wasPlaying = playing
      pausePlay('Timeline scrubbed')
      seekTo(elapsedFromClientX(event.clientX))
      if (wasPlaying) {
        startPlay()
      }
    })

    document.getElementById('btn-copy-link').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(location.href)
        statusMsgEl.textContent = 'Replay link copied!'
      } catch {
        statusMsgEl.textContent = 'Copy link manually: ' + location.href
      }
    })

    loadSession()
  </script>
</body>
</html>
