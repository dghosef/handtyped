<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HumanProof</title>
  <style>
    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Base ──────────────────────────────────────────────────────────── */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      background: #e8e8e8;
      color: #111;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Title Bar ─────────────────────────────────────────────────────── */
    #title-bar {
      background: linear-gradient(to bottom, #2b5797, #1e3d72);
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 36px;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    #title-bar .title-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    #title-bar .app-name {
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0.9;
    }
    #title-bar .doc-name {
      opacity: 0.7;
      font-size: 12px;
    }
    #title-bar .title-right {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    #btn-export-title, #btn-dark {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      padding: 3px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      -webkit-app-region: no-drag;
    }
    #btn-export-title:hover, #btn-dark:hover {
      background: rgba(255,255,255,0.25);
    }
    #tb-save-status {
      font-size: 11px;
      opacity: 0.65;
    }

    /* ── Toolbar wrapper ───────────────────────────────────────────────── */
    #toolbar-wrapper {
      background: #f3f3f3;
      border-bottom: 1px solid #c8c8c8;
      flex-shrink: 0;
    }

    /* ── Toolbar rows ──────────────────────────────────────────────────── */
    .toolbar-row {
      display: flex;
      align-items: center;
      padding: 2px 6px;
      gap: 1px;
      flex-wrap: nowrap;
      height: 30px;
    }
    .toolbar-row + .toolbar-row {
      border-top: 1px solid #e0e0e0;
    }

    /* ── Toolbar separator ─────────────────────────────────────────────── */
    .tb-sep {
      width: 1px;
      height: 18px;
      background: #c8c8c8;
      margin: 0 4px;
      flex-shrink: 0;
    }

    /* ── Toolbar buttons ───────────────────────────────────────────────── */
    .tb-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 4px;
      border: 1px solid transparent;
      border-radius: 2px;
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tb-btn:hover { background: #e5e5e5; border-color: #c8c8c8; }
    .tb-btn.active { background: #cce4f7; border-color: #66a7d4; }
    .tb-btn.active:hover { background: #b8d8f0; }

    /* ── Toolbar selects ───────────────────────────────────────────────── */
    .tb-select {
      height: 22px;
      border: 1px solid #c8c8c8;
      border-radius: 2px;
      background: white;
      font-size: 12px;
      color: #333;
      padding: 0 4px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .tb-select:focus { outline: none; border-color: #66a7d4; }
    #style-select { width: 96px; }
    #font-family-select { width: 130px; }
    #font-size-select { width: 46px; }

    /* ── Color swatch ──────────────────────────────────────────────────── */
    #btn-color {
      position: relative;
      padding: 0 4px;
    }
    #btn-color .letter {
      font-weight: 700;
      font-size: 14px;
      line-height: 1;
      display: block;
    }
    #color-swatch {
      width: 16px;
      height: 3px;
      background: #000;
      margin: 1px auto 0;
      border-radius: 1px;
      display: block;
    }
    #color-picker, #highlight-picker {
      position: absolute;
      width: 0; height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Find bar ──────────────────────────────────────────────────────── */
    #find-bar {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      background: #fff9c4;
      border-top: 1px solid #e0d060;
      border-bottom: 1px solid #e0d060;
      flex-shrink: 0;
    }
    #find-bar.visible { display: flex; }
    #find-input {
      width: 200px;
      height: 22px;
      border: 1px solid #c8c8c8;
      border-radius: 2px;
      padding: 0 6px;
      font-size: 12px;
    }
    #find-input:focus { outline: none; border-color: #66a7d4; }
    #find-count { font-size: 12px; color: #666; min-width: 70px; }
    #find-close { background: none; border: none; cursor: pointer; font-size: 16px; color: #666; line-height: 1; }
    #find-close:hover { color: #111; }

    /* ── Page area ─────────────────────────────────────────────────────── */
    #page-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px 60px;
      background: #e8e8e8;
    }
    /* ── Content wrapper (outline + page-area) ──────────────────────────── */
    body > div[style*="display:flex"] {
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ── Page (Word-style white sheet) ─────────────────────────────────── */
    #page {
      width: 816px;
      min-height: 1056px;
      margin: 0 auto;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25), 0 0 0 1px rgba(0,0,0,0.06);
      padding: 96px 96px;
      position: relative;
    }

    /* ── Editor ────────────────────────────────────────────────────────── */
    #editor {
      min-height: calc(1056px - 192px);
      outline: none;
      cursor: text;
      user-select: text;
    }
    .ProseMirror {
      outline: none;
      font-size: 12pt;
      font-family: "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #111;
      min-height: 100%;
    }
    .ProseMirror > * + * { margin-top: 0.6em; }
    .ProseMirror p { margin: 0 0 0.5em; }
    .ProseMirror h1 { font-size: 2em;   font-weight: 700; margin: 0 0 0.4em; }
    .ProseMirror h2 { font-size: 1.5em; font-weight: 600; margin: 0 0 0.4em; }
    .ProseMirror h3 { font-size: 1.25em; font-weight: 600; margin: 0 0 0.3em; }
    .ProseMirror h4 { font-size: 1.1em; font-weight: 600; margin: 0 0 0.3em; }
    .ProseMirror ul, .ProseMirror ol { padding-left: 1.8em; margin: 0 0 0.5em; }
    .ProseMirror li { margin-bottom: 0.2em; }
    .ProseMirror blockquote {
      border-left: 3px solid #c0c0c0;
      margin: 0.5em 0;
      padding-left: 1em;
      color: #555;
      font-style: italic;
    }
    .ProseMirror hr {
      border: none;
      border-top: 1px solid #d0d0d0;
      margin: 1em 0;
    }
    /* Placeholder text */
    .ProseMirror p.is-editor-empty:first-child::before {
      content: attr(data-placeholder);
      color: #aaa;
      pointer-events: none;
      float: left;
      height: 0;
    }

    /* Find decorations */
    .find-match { background: #ffff00; border-radius: 2px; }
    .find-match.current { background: #ff9900; }

    /* ── Status bar ────────────────────────────────────────────────────── */
    #status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 22px;
      background: #2b5797;
      color: rgba(255,255,255,0.85);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      font-size: 11px;
      z-index: 100;
    }
    #status-bar span { white-space: nowrap; }
    #save-status { margin-left: auto; }

    /* ── Dark mode ─────────────────────────────────────────────────────── */
    body.dark { background: #1a1a1a; color: #e0e0e0; }
    body.dark #toolbar-wrapper { background: #2d2d2d; border-color: #444; }
    body.dark .toolbar-row + .toolbar-row { border-color: #444; }
    body.dark .tb-sep { background: #555; }
    body.dark .tb-btn { color: #ddd; }
    body.dark .tb-btn:hover { background: #3a3a3a; border-color: #555; }
    body.dark .tb-btn.active { background: #1a4a70; border-color: #3a7ab0; }
    body.dark .tb-select { background: #3a3a3a; border-color: #555; color: #ddd; }
    body.dark #page-area { background: #1a1a1a; }
    body.dark #page { background: #2a2a2a; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    body.dark .ProseMirror { color: #e0e0e0; }
    body.dark .ProseMirror blockquote { border-color: #555; color: #aaa; }
    body.dark .ProseMirror hr { border-color: #444; }
    body.dark #find-bar { background: #3a3600; border-color: #665c00; }
    body.dark #find-input { background: #2d2d2d; border-color: #555; color: #ddd; }
    body.dark #find-count { color: #aaa; }

    /* ── Page break ────────────────────────────────────────────────────── */
    .page-break {
      display: block;
      width: 100%;
      margin: 1.5em 0;
      position: relative;
      cursor: default;
      user-select: none;
    }
    .page-break hr {
      border: none;
      border-top: 2px dashed #aaa;
      margin: 0;
    }
    .page-break::after {
      content: 'Page Break';
      position: absolute;
      top: -9px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #aaa;
      background: white;
      padding: 0 6px;
      pointer-events: none;
    }

    /* ── Table styles ───────────────────────────────────────────────────── */
    .ProseMirror table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.8em 0;
      overflow: auto;
      table-layout: fixed;
    }
    .ProseMirror td, .ProseMirror th {
      border: 1px solid #ccc;
      padding: 6px 10px;
      vertical-align: top;
      min-width: 40px;
      position: relative;
      box-sizing: border-box;
    }
    .ProseMirror th {
      background: #f5f5f5;
      font-weight: 600;
    }
    .ProseMirror td:hover, .ProseMirror th:hover {
      background: rgba(66, 133, 244, 0.04);
    }
    .selectedCell { background: rgba(66, 133, 244, 0.12) !important; }
    .column-resize-handle {
      position: absolute;
      right: -2px;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #4285f4;
      cursor: col-resize;
      z-index: 20;
    }

    /* ── Table toolbar ──────────────────────────────────────────────────── */
    #table-toolbar {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: #f0f4ff;
      border-bottom: 1px solid #c0ccff;
      flex-shrink: 0;
    }
    #table-toolbar button {
      padding: 2px 8px;
      font-size: 11px;
      border: 1px solid #b0b8e0;
      border-radius: 3px;
      background: white;
      cursor: pointer;
      color: #333;
    }
    #table-toolbar button:hover { background: #e8eeff; }

    /* ── Outline panel ──────────────────────────────────────────────────── */
    #outline-panel {
      display: none;
      flex-direction: column;
      width: 220px;
      min-width: 180px;
      background: #fafafa;
      border-right: 1px solid #ddd;
      flex-shrink: 0;
      overflow-y: auto;
    }
    #outline-header {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 12px 6px;
      border-bottom: 1px solid #eee;
    }
    #outline-content { flex: 1; overflow-y: auto; }
    .outline-item {
      font-size: 12px;
      color: #333;
      padding: 4px 8px;
      cursor: pointer;
      border-radius: 3px;
      margin: 1px 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .outline-item:hover { background: #eef3ff; color: #2b5797; }
    .outline-h1 { font-weight: 600; font-size: 13px; }
    .outline-h2 { font-weight: 500; }
    .outline-h3 { color: #555; }
    .outline-h4 { color: #777; font-size: 11px; }
    .outline-empty { font-size: 11px; color: #aaa; padding: 12px; text-align: center; }

    /* ── Focus mode ─────────────────────────────────────────────────────── */
    body.focus-mode #page-area { background: #111; }
    body.focus-mode #page { background: #1a1a1a; box-shadow: none; }
    body.focus-mode .ProseMirror { color: rgba(220,220,220,0.4); }
    body.focus-mode .ProseMirror p:focus-within,
    body.focus-mode .ProseMirror p:has(.ProseMirror-cursor) {
      color: rgba(240,240,240,1);
    }
    body.focus-mode #toolbar-wrapper { opacity: 0.3; transition: opacity 0.2s; }
    body.focus-mode #toolbar-wrapper:hover { opacity: 1; }
    body.focus-mode #title-bar { opacity: 0.4; transition: opacity 0.2s; }
    body.focus-mode #title-bar:hover { opacity: 1; }

    /* ── Replace bar ────────────────────────────────────────────────────── */
    #replace-bar {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      background: #f0fff4;
      border-bottom: 1px solid #90d0a0;
      flex-shrink: 0;
    }
    #replace-bar.visible { display: flex; }
    #replace-input {
      width: 180px;
      height: 22px;
      border: 1px solid #c8c8c8;
      border-radius: 2px;
      padding: 0 6px;
      font-size: 12px;
    }
    #replace-input:focus { outline: none; border-color: #66a7d4; }
    #btn-replace-one, #btn-replace-all {
      padding: 2px 10px;
      font-size: 12px;
      border: 1px solid #c8c8c8;
      border-radius: 3px;
      background: white;
      cursor: pointer;
    }
    #btn-replace-one:hover, #btn-replace-all:hover { background: #f0f0f0; }

    /* ── Print ─────────────────────────────────────────────────────────── */
    @media print {
      /* Hide all UI chrome */
      #title-bar, #toolbar-wrapper, #find-bar, #replace-bar, #status-bar,
      #table-toolbar, #outline-panel, #shortcut-panel, #help-panel,
      #hid-blocked, #proof-url-overlay { display: none !important; }

      /* Body / layout reset */
      body {
        background: white !important;
        overflow: visible !important;
        height: auto !important;
        font-family: Georgia, "Times New Roman", serif !important;
        font-size: 12pt !important;
        color: #000 !important;
      }

      /* Page area */
      #page-area {
        overflow: visible !important;
        padding: 0 !important;
        background: white !important;
        display: block !important;
      }
      #md-split-pane { display: none !important; }

      /* White sheet — let the OS apply margins via @page */
      #page {
        box-shadow: none !important;
        margin: 0 auto !important;
        width: auto !important;
        min-height: auto !important;
        padding: 0 !important;
      }

      /* OS-level page margins */
      @page { margin: 1in; }

      /* Editor content */
      .ProseMirror {
        font-family: Georgia, "Times New Roman", serif !important;
        font-size: 12pt !important;
        color: #000 !important;
        line-height: 1.6 !important;
      }

      /* Headings */
      .ProseMirror h1 { font-size: 24pt !important; page-break-after: avoid; }
      .ProseMirror h2 { font-size: 18pt !important; page-break-after: avoid; }
      .ProseMirror h3 { font-size: 14pt !important; page-break-after: avoid; }
      .ProseMirror h4 { font-size: 12pt !important; page-break-after: avoid; }

      /* Lists */
      .ProseMirror ul, .ProseMirror ol { padding-left: 1.8em; }

      /* Blockquote */
      .ProseMirror blockquote {
        border-left: 3px solid #888 !important;
        color: #333 !important;
        padding-left: 1em;
        margin: 0.5em 0;
        font-style: italic;
      }

      /* Tables */
      .ProseMirror table { width: 100%; border-collapse: collapse; page-break-inside: auto; }
      .ProseMirror td, .ProseMirror th { border: 1px solid #999 !important; padding: 4px 8px; }
      .ProseMirror th { background: #eee !important; }
      tr { page-break-inside: avoid; page-break-after: auto; }

      /* Code blocks */
      .ProseMirror pre {
        background: #f5f5f5 !important;
        color: #111 !important;
        border: 1px solid #ddd !important;
        border-radius: 0 !important;
        padding: 8px 12px !important;
        font-family: 'Menlo', 'Courier New', monospace !important;
        font-size: 10pt !important;
        white-space: pre-wrap !important;
        page-break-inside: avoid;
      }

      /* Images */
      img { max-width: 100% !important; page-break-inside: avoid; }

      /* Links — show href after link text */
      a[href]:after { content: " (" attr(href) ")"; font-size: 10pt; color: #444; }
      /* suppress for anchor-only links and empty hrefs */
      a[href^="#"]:after, a[href=""]:after { content: ""; }

      /* Page break node */
      .page-break {
        page-break-after: always !important;
        border: none !important;
        margin: 0 !important;
        display: block !important;
      }
      .page-break hr, .page-break::after { display: none !important; }

      /* 2-column layout */
      .column-block { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

      /* Task list */
      ul[data-task] { list-style: none; padding-left: 0; }
      ul[data-task] li[data-task-item][data-checked] > span { text-decoration: line-through; opacity: 0.6; }
    }

    /* ── Proof URL overlay ─────────────────────────────────────────────── */
    #proof-url-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center; z-index: 9999;
    }
    .proof-url-box {
      background: white; border-radius: 12px; padding: 32px 36px;
      max-width: 500px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .proof-url-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #111; }
    .proof-url-desc { font-size: 13px; color: #555; margin-bottom: 16px; }
    .proof-url-link { display: flex; gap: 8px; margin-bottom: 16px; }
    .proof-url-link input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
    .proof-url-link button, .proof-url-box > button {
      padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 600;
    }
    .proof-url-link button { background: #2b5797; color: white; }
    .proof-url-box > button { background: #f0f0f0; color: #333; width: 100%; margin-top: 4px; }

    /* ── HID blocked overlay ───────────────────────────────────────────── */
    #hid-blocked {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }
    .hid-blocked-box {
      background: white;
      border-radius: 10px;
      padding: 36px 40px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .hid-blocked-icon { font-size: 48px; margin-bottom: 12px; }
    .hid-blocked-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 12px; color: #1a1a1a; }
    .hid-blocked-box p { font-size: 13px; color: #555; margin-bottom: 10px; }
    .hid-blocked-box ol { text-align: left; font-size: 13px; color: #444; padding-left: 20px; margin-top: 8px; }
    .hid-blocked-box ol li { margin-bottom: 6px; line-height: 1.5; }
    #btn-open-privacy {
      margin-top: 18px;
      padding: 9px 20px;
      background: #2b5797;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    #btn-open-privacy:hover { background: #1e3d72; }

    /* ── Code block ─────────────────────────────────────────────────────── */
    .ProseMirror pre {
      background: #1e1e1e; color: #d4d4d4; border-radius: 6px;
      padding: 12px 16px; font-family: 'Menlo','Courier New',monospace;
      font-size: 12px; overflow-x: auto; margin: 8px 0;
    }
    .ProseMirror pre code { background: none; padding: 0; }
    .ProseMirror pre.ProseMirror-selectednode { outline: 2px solid #66a7d4; }

    /* ── Task list ──────────────────────────────────────────────────────── */
    ul[data-task] { list-style: none; padding-left: 4px; }
    ul[data-task] li[data-task-item] { display: flex; align-items: baseline; gap: 6px; padding: 1px 0; }
    ul[data-task] li[data-task-item] > input[type=checkbox] { flex-shrink: 0; cursor: pointer; margin-top: 2px; }
    ul[data-task] li[data-task-item][data-checked] > span { text-decoration: line-through; opacity: 0.5; }

    /* ── Footnotes ──────────────────────────────────────────────────────── */
    sup.footnote-ref { color: #2b5797; cursor: pointer; font-size: 0.75em; }
    .footnote-def { font-size: 12px; color: #555; border-top: 1px solid #ddd; padding-top: 4px; margin-top: 4px; }
    .footnote-def::before { content: attr(data-n) '. '; font-weight: 600; color: #2b5797; }

    /* ── 2-column layout ────────────────────────────────────────────────── */
    .column-block { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin: 8px 0; }
    .column { min-width: 0; }

    /* ── Paragraph spacing selects ─────────────────────────────────────── */
    #space-before-select, #space-after-select { width: 50px; }

    /* ── Shortcut panel ─────────────────────────────────────────────────── */
    #shortcut-panel {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 9998; align-items: center; justify-content: center;
    }
    #shortcut-panel.visible { display: flex; }
    .shortcut-box {
      background: white; border-radius: 10px; padding: 24px 28px;
      max-width: 700px; width: 95%; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .shortcut-box h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #111; }
    .shortcut-category { margin-bottom: 16px; }
    .shortcut-category h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #888; margin-bottom: 6px; }
    .shortcut-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 16px; }
    .shortcut-row { display: flex; gap: 10px; align-items: baseline; padding: 2px 0; font-size: 12px; }
    .shortcut-key { flex-shrink: 0; background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px; padding: 1px 6px; font-family: monospace; font-size: 11px; min-width: 90px; text-align: center; }
    .shortcut-desc { color: #444; }
    #shortcut-close { margin-top: 16px; padding: 6px 20px; border: 1px solid #ccc; border-radius: 5px; background: #f5f5f5; cursor: pointer; font-size: 13px; display: block; }

    /* ── Help panel ─────────────────────────────────────────────────────── */
    #help-panel {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      z-index: 9998; align-items: center; justify-content: center;
    }
    #help-panel.visible { display: flex; }
    .help-box {
      background: white; border-radius: 10px; padding: 24px 28px;
      max-width: 760px; width: 95%; max-height: 82vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    .help-box h2 { font-size: 18px; font-weight: 700; margin-bottom: 10px; color: #111; }
    .help-box p { font-size: 13px; line-height: 1.6; color: #444; margin-bottom: 10px; }
    .help-box ul, .help-box ol { margin: 8px 0 14px 20px; color: #444; font-size: 13px; line-height: 1.6; }
    .help-box li { margin-bottom: 6px; }
    .help-actions { display: flex; gap: 10px; margin-top: 18px; }
    .help-actions button {
      padding: 8px 14px; border-radius: 6px; border: 1px solid #c8c8c8;
      background: #f5f5f5; cursor: pointer; font-size: 13px;
    }
    .help-actions button.primary { background: #2b5797; color: white; border-color: #1e3d72; }

    /* ── Markdown split pane ────────────────────────────────────────────── */
    #md-split-pane { display: none; flex: 1; overflow: hidden; }
    #md-split-pane.visible { display: flex; }
    #md-source-wrapper {
      flex: 1; position: relative; overflow: hidden;
      border-right: 1px solid #333;
    }
    #md-highlight {
      position: absolute; inset: 0; pointer-events: none; z-index: 1;
      padding: 20px; font-family: 'Menlo','Courier New',monospace; font-size: 13px;
      white-space: pre-wrap; word-break: break-word; overflow: auto;
      background: #1e1e1e; color: #d4d4d4; line-height: 1.6;
    }
    #md-source-input {
      position: absolute; inset: 0; z-index: 2;
      padding: 20px; font-family: 'Menlo','Courier New',monospace; font-size: 13px;
      overflow: auto; resize: none; border: 0;
      background: transparent; color: rgba(255,255,255,0.12); caret-color: #fff;
      outline: none; line-height: 1.6;
      width: 100%; height: 100%;
    }
    #md-preview {
      flex: 1; display: block; width: 100%; height: 100%;
      border: 0; background: white;
    }
    /* md highlight spans */
    .md-h1,.md-h2,.md-h3,.md-h4,.md-h5,.md-h6 { color: #569cd6; }
    .md-strong { color: #ce9178; }
    .md-em { color: #4ec9b0; }
    .md-code { color: #b5cea8; }
    .md-fence { color: #808080; }
    .md-link { color: #dcdcaa; }
    .md-quote { color: #6a9955; }
    .md-list { color: #c586c0; }

    /* ── Inline images ──────────────────────────────────────────────────── */
    .ProseMirror img {
      max-width: 100%;
      vertical-align: middle;
      cursor: default;
    }
    .ProseMirror img.ProseMirror-selectednode {
      outline: 2px solid #66a7d4;
      border-radius: 2px;
    }

    /* ── Smart typography indicator ─────────────────────────────────────── */
    #smart-typo-indicator { font-size: 10px; color: #4ec9b0; }

    /* ── Readability in status bar ──────────────────────────────────────── */
    #readability-score { font-size: 11px; }

    /* ── Word goal in status bar ────────────────────────────────────────── */
    #word-goal-area {
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    #word-goal-set-btn {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.75);
      padding: 1px 5px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      line-height: 1.4;
    }
    #word-goal-set-btn:hover { background: rgba(255,255,255,0.25); }
    #word-goal-progress { display: none; align-items: center; gap: 4px; }
    #word-goal-progress.visible { display: flex; }
    #word-goal-label { font-size: 11px; }
    #word-goal-label.goal-done  { color: #5dde7a; font-weight: 600; }
    #word-goal-label.goal-close { color: #f5a623; }
    #word-goal-bar-wrap {
      width: 48px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      overflow: hidden;
    }
    #word-goal-bar {
      height: 100%;
      background: #66a7d4;
      border-radius: 2px;
      transition: width 0.2s, background 0.2s;
    }
    #word-goal-bar.goal-done  { background: #5dde7a; }
    #word-goal-bar.goal-close { background: #f5a623; }
    #word-goal-clear {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 12px;
      padding: 0 1px;
      line-height: 1;
    }
    #word-goal-clear:hover { color: rgba(255,255,255,0.9); }
    #word-goal-input-wrap {
      display: none;
      align-items: center;
      gap: 4px;
    }
    #word-goal-input-wrap.visible { display: flex; }
    #word-goal-input {
      width: 64px;
      height: 17px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 2px;
      background: rgba(0,0,0,0.25);
      color: white;
      font-size: 11px;
      padding: 0 4px;
      outline: none;
    }
    #word-goal-input::placeholder { color: rgba(255,255,255,0.4); }
    #word-goal-ok {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 2px;
      cursor: pointer;
      line-height: 1.4;
    }
    #word-goal-ok:hover { background: rgba(255,255,255,0.3); }
    #word-goal-cancel {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 12px;
      padding: 0;
      line-height: 1;
    }
    #word-goal-cancel:hover { color: rgba(255,255,255,0.9); }

    /* ── Link dialog ────────────────────────────────────────────────────── */
    #link-dialog {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 9999; align-items: center; justify-content: center;
    }
    #link-dialog.visible { display: flex; }
    .link-dialog-box {
      background: white; border-radius: 8px; padding: 20px 24px;
      min-width: 340px; max-width: 480px; width: 90%;
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }
    .link-dialog-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .link-dialog-header h3 { font-size: 15px; font-weight: 700; color: #111; margin: 0; }
    #link-dialog-close {
      background: none; border: none; cursor: pointer; font-size: 18px;
      color: #888; line-height: 1; padding: 0 2px;
    }
    #link-dialog-close:hover { color: #111; }
    .link-dialog-field { margin-bottom: 12px; }
    .link-dialog-field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 600; }
    .link-dialog-field input {
      width: 100%; height: 28px; border: 1px solid #c8c8c8; border-radius: 4px;
      padding: 0 8px; font-size: 13px; box-sizing: border-box;
    }
    .link-dialog-field input:focus { outline: none; border-color: #66a7d4; }
    .link-dialog-actions { display: flex; gap: 8px; margin-top: 16px; }
    #link-dialog-insert {
      flex: 1; padding: 6px 14px; background: #2b5797; color: white;
      border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    #link-dialog-insert:hover { background: #1e3d72; }
    #link-dialog-remove {
      padding: 6px 14px; background: #dc3545; color: white;
      border: none; border-radius: 5px; cursor: pointer; font-size: 13px; font-weight: 600;
    }
    #link-dialog-remove:hover { background: #b02a37; }
    #link-dialog-cancel {
      padding: 6px 14px; background: #f0f0f0; color: #333;
      border: 1px solid #c8c8c8; border-radius: 5px; cursor: pointer; font-size: 13px;
    }
    #link-dialog-cancel:hover { background: #e0e0e0; }
    body.dark .link-dialog-box { background: #2d2d2d; }
    body.dark .link-dialog-header h3 { color: #e0e0e0; }
    body.dark #link-dialog-close { color: #999; }
    body.dark #link-dialog-close:hover { color: #ddd; }
    body.dark .link-dialog-field label { color: #aaa; }
    body.dark .link-dialog-field input { background: #3a3a3a; border-color: #555; color: #ddd; }
    body.dark .link-dialog-field input:focus { border-color: #66a7d4; }
    body.dark #link-dialog-cancel { background: #3a3a3a; border-color: #555; color: #ddd; }
    body.dark #link-dialog-cancel:hover { background: #444; }

    /* ── Special chars dialog ───────────────────────────────────────────── */
    #special-chars-dialog {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 9998; align-items: center; justify-content: center;
    }
    #special-chars-dialog.visible { display: flex; }
    .sc-box {
      background: white; border-radius: 10px; padding: 20px 22px;
      max-width: 520px; width: 95%; max-height: 82vh;
      display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    body.dark .sc-box { background: #2d2d2d; color: #ddd; }
    .sc-box h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: #111; }
    body.dark .sc-box h2 { color: #eee; }
    #sc-search {
      width: 100%; height: 26px; border: 1px solid #c8c8c8; border-radius: 4px;
      padding: 0 8px; font-size: 12px; margin-bottom: 10px; flex-shrink: 0;
    }
    body.dark #sc-search { background: #3a3a3a; border-color: #555; color: #ddd; }
    #sc-search:focus { outline: none; border-color: #66a7d4; }
    #sc-recent { flex-shrink: 0; margin-bottom: 8px; }
    #sc-recent-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #888; margin-bottom: 4px;
    }
    #sc-body { overflow-y: auto; flex: 1; }
    .sc-category { margin-bottom: 10px; }
    .sc-cat-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: #888; margin-bottom: 4px;
    }
    .sc-grid {
      display: grid; grid-template-columns: repeat(auto-fill, 28px); gap: 2px;
    }
    .sc-char {
      width: 28px; height: 28px; display: flex; align-items: center;
      justify-content: center; font-size: 15px; border: 1px solid transparent;
      border-radius: 3px; cursor: pointer; background: transparent;
      color: inherit; padding: 0; line-height: 1;
    }
    .sc-char:hover { background: #e5e5e5; border-color: #c8c8c8; }
    body.dark .sc-char:hover { background: #3a3a3a; border-color: #555; }
    #sc-close {
      margin-top: 12px; padding: 5px 18px; border: 1px solid #ccc;
      border-radius: 5px; background: #f5f5f5; cursor: pointer; font-size: 13px;
      flex-shrink: 0; align-self: flex-start;
    }
    body.dark #sc-close { background: #3a3a3a; border-color: #555; color: #ddd; }
  </style>
</head>
<body>

  <!-- ── Title Bar ──────────────────────────────────────────────────────── -->
  <div id="title-bar">
    <div class="title-left">
      <span class="app-name">HumanProof</span>
      <span class="doc-name">Document</span>
    </div>
    <div class="title-right">
      <span id="tb-save-status"></span>
      <button id="btn-dark">Dark</button>
      <button id="btn-export-title">Export Bundle</button>
    </div>
  </div>

  <!-- ── Toolbar ────────────────────────────────────────────────────────── -->
  <div id="toolbar-wrapper">

    <!-- Row 1: Undo/Redo | Style | Font family | Font size | Bold/Italic/Underline/Strike | Color | Highlight | Clear -->
    <div class="toolbar-row">
      <button class="tb-btn" id="btn-undo" title="Undo (Ctrl+Z)">&#8617;</button>
      <button class="tb-btn" id="btn-redo" title="Redo (Ctrl+Y)">&#8618;</button>
      <span class="tb-sep"></span>

      <select class="tb-select" id="style-select" title="Paragraph style">
        <option value="paragraph">Normal</option>
        <option value="h1">Heading 1</option>
        <option value="h2">Heading 2</option>
        <option value="h3">Heading 3</option>
        <option value="h4">Heading 4</option>
      </select>
      <span class="tb-sep"></span>

      <select class="tb-select" id="font-family-select" title="Font family">
        <option value="Helvetica Neue">Helvetica Neue</option>
        <option value="Arial">Arial</option>
        <option value="Georgia">Georgia</option>
        <option value="Times New Roman">Times New Roman</option>
        <option value="Courier New">Courier New</option>
        <option value="Palatino">Palatino</option>
        <option value="Optima">Optima</option>
        <option value="Futura">Futura</option>
        <option value="Baskerville">Baskerville</option>
        <option value="Gill Sans">Gill Sans</option>
      </select>
      <span class="tb-sep"></span>

      <select class="tb-select" id="font-size-select" title="Font size">
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12" selected>12</option>
        <option value="14">14</option>
        <option value="16">16</option>
        <option value="18">18</option>
        <option value="20">20</option>
        <option value="24">24</option>
        <option value="28">28</option>
        <option value="36">36</option>
        <option value="48">48</option>
        <option value="72">72</option>
      </select>
      <span class="tb-sep"></span>

      <button class="tb-btn" id="btn-bold"      title="Bold (Ctrl+B)"><b>B</b></button>
      <button class="tb-btn" id="btn-italic"    title="Italic (Ctrl+I)"><i>I</i></button>
      <button class="tb-btn" id="btn-underline" title="Underline (Ctrl+U)" style="text-decoration:underline">U</button>
      <button class="tb-btn" id="btn-strike"    title="Strikethrough" style="text-decoration:line-through">S</button>
      <button class="tb-btn" id="btn-subscript"   title="Subscript (⌘⇧,)">X<sub style="font-size:8px">2</sub></button>
      <button class="tb-btn" id="btn-superscript" title="Superscript (⌘⇧.)">X<sup style="font-size:8px">2</sup></button>
      <span class="tb-sep"></span>

      <!-- Text color -->
      <button class="tb-btn" id="btn-color" title="Text color">
        <span>
          <span class="letter">A</span>
          <span id="color-swatch"></span>
        </span>
        <input type="color" id="color-picker" value="#000000" tabindex="-1">
      </button>
      <!-- Highlight -->
      <button class="tb-btn" id="btn-highlight" title="Highlight" style="position:relative">
        <span style="background:#ffff00;padding:1px 3px;border-radius:2px;font-size:12px;">ab</span>
        <input type="color" id="highlight-picker" value="#ffff00" tabindex="-1">
      </button>
      <span class="tb-sep"></span>

      <button class="tb-btn" id="btn-clear-format" title="Clear formatting (Ctrl+\)">&#8856;</button>
      <span class="tb-sep"></span>

      <button class="tb-btn" id="btn-find" title="Find (Ctrl+F)">&#128269;</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-upload-proof" title="Publish Proof" style="background:#16c784;color:#000;font-weight:600;border-color:#10a868;">&#8593; Publish Proof</button>
    </div>

    <!-- Row 2: Alignment | Lists | Indent | Blockquote | HR -->
    <div class="toolbar-row">
      <button class="tb-btn active" id="btn-align-left"    title="Align left (Ctrl+L)">&#8676;</button>
      <button class="tb-btn" id="btn-align-center"  title="Align center (Ctrl+E)">&#8680;</button>
      <button class="tb-btn" id="btn-align-right"   title="Align right (Ctrl+R)">&#8677;</button>
      <button class="tb-btn" id="btn-align-justify" title="Justify (Ctrl+J)">&#8801;</button>
      <span class="tb-sep"></span>

      <button class="tb-btn" id="btn-bullet-list"  title="Bullet list">&#8226; List</button>
      <button class="tb-btn" id="btn-ordered-list" title="Numbered list">1. List</button>
      <span class="tb-sep"></span>

      <button class="tb-btn" id="btn-indent"  title="Increase indent (Tab)">&#8677;&#8677;</button>
      <button class="tb-btn" id="btn-outdent" title="Decrease indent (Shift+Tab)">&#8676;&#8676;</button>
      <span class="tb-sep"></span>

      <button class="tb-btn" id="btn-blockquote" title="Blockquote">&#10077;</button>
      <button class="tb-btn" id="btn-hr"          title="Horizontal rule">&#9135;</button>
    </div>

    <!-- Row 3: Table | Page break | Focus mode | Line spacing | Outline toggle -->
    <div class="toolbar-row">
      <button class="tb-btn" id="btn-insert-table" title="Insert Table (⌘⇧T)">&#8862; Table</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-page-break" title="Insert Page Break (⌘Enter)">&#8863; Break</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-focus-mode" title="Focus Mode (⌘⇧F)">&#9680; Focus</button>
      <span class="tb-sep"></span>
      <label style="font-size:11px;color:#666;">Line:</label>
      <select class="tb-select" id="line-height-select" style="width:60px;">
        <option value="">Auto</option>
        <option value="1.0">1.0</option>
        <option value="1.15">1.15</option>
        <option value="1.5">1.5</option>
        <option value="1.6" selected>1.6</option>
        <option value="2.0">2.0</option>
        <option value="2.5">2.5</option>
        <option value="3.0">3.0</option>
      </select>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-outline" title="Document Outline">&#8801; Outline</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-fullscreen" title="Fullscreen">&#9974;</button>
      <button class="tb-btn" id="btn-markdown" title="Markdown Mode">MD</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-print" title="Print / Save as PDF (&#8984;P)">&#128424;</button>
    </div>

    <!-- Row 4: Code block | Task list | Para spacing | Footnote | Columns | Shortcuts -->
    <div class="toolbar-row">
      <button class="tb-btn" id="btn-code-block" title="Code Block (⌘⇧K)">&lt;/&gt;</button>
      <button class="tb-btn" id="btn-task-list" title="Task List (⌘⇧9)">&#9745; Tasks</button>
      <span class="tb-sep"></span>
      <label style="font-size:11px;color:#666;">&#8593;</label>
      <select class="tb-select" id="space-before-select" title="Space before paragraph">
        <option value="0" selected>0</option>
        <option value="6">6pt</option>
        <option value="12">12pt</option>
        <option value="18">18pt</option>
        <option value="24">24pt</option>
        <option value="36">36pt</option>
      </select>
      <label style="font-size:11px;color:#666;">&#8595;</label>
      <select class="tb-select" id="space-after-select" title="Space after paragraph">
        <option value="0" selected>0</option>
        <option value="6">6pt</option>
        <option value="12">12pt</option>
        <option value="18">18pt</option>
        <option value="24">24pt</option>
        <option value="36">36pt</option>
      </select>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-footnote" title="Insert Footnote (⌘⇧F)">FN&#8321;</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-2col" title="2-Column Layout (⌘⇧2)">&#10095;&#10094; 2-Col</button>
      <button class="tb-btn" id="btn-1col" title="1-Column Layout (⌘⇧1)">&#9646; 1-Col</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-insert-image" title="Insert Image">&#128444;</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-toc" title="Insert / Update Table of Contents (⌘⇧O)">&#8801; TOC</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-link" title="Insert/Edit Link (⌘K)">&#128279;</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-shortcuts" title="Keyboard Shortcuts (⌘/)">?</button>
      <span class="tb-sep"></span>
      <button class="tb-btn" id="btn-special-chars" title="Insert Special Character (⌘⇧\)">&#937;</button>
    </div>

  </div><!-- /toolbar-wrapper -->

  <!-- ── Find Bar ────────────────────────────────────────────────────────── -->
  <div id="find-bar">
    <label style="font-size:12px;color:#555;">Find:</label>
    <input type="text" id="find-input" placeholder="Search…" autocomplete="off" spellcheck="false" />
    <span id="find-count"></span>
    <button class="tb-btn" id="btn-find-prev" title="Previous (Shift+Enter)">&#9650;</button>
    <button class="tb-btn" id="btn-find-next" title="Next (Enter)">&#9660;</button>
    <button id="find-close" title="Close (Esc)">&times;</button>
  </div>

  <!-- ── Replace Bar ──────────────────────────────────────────────────────── -->
  <div id="replace-bar">
    <label style="font-size:12px;color:#555;">Replace:</label>
    <input type="text" id="replace-input" placeholder="Replace with…" autocomplete="off" spellcheck="false" />
    <button id="btn-replace-one">Replace</button>
    <button id="btn-replace-all">All</button>
  </div>

  <!-- ── Table Toolbar ──────────────────────────────────────────────────── -->
  <div id="table-toolbar">
    <button id="btn-table-add-row" title="Add row below">+Row</button>
    <button id="btn-table-add-col" title="Add column right">+Col</button>
    <button id="btn-table-del-row" title="Delete row">-Row</button>
    <button id="btn-table-del-col" title="Delete column">-Col</button>
    <button id="btn-table-merge" title="Merge cells">Merge</button>
    <button id="btn-table-split" title="Split cell">Split</button>
  </div>

  <!-- ── Main content area (outline + page) ─────────────────────────────── -->
  <div style="display:flex;flex:1;overflow:hidden;">

    <!-- ── Outline Panel ────────────────────────────────────────────────── -->
    <div id="outline-panel">
      <div id="outline-header">Outline</div>
      <div id="outline-content"></div>
    </div>

    <!-- ── Page Area ──────────────────────────────────────────────────────── -->
    <div id="page-area" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;">
      <!-- ── Markdown split pane ────────────────────────────────────────── -->
      <div id="md-split-pane">
        <div id="md-source-wrapper">
          <div id="md-highlight" aria-hidden="true"></div>
          <textarea id="md-source-input" spellcheck="false"></textarea>
        </div>
        <iframe id="md-preview"></iframe>
      </div>
      <div id="page">
        <div id="editor"></div>
      </div>
    </div>

  </div><!-- /main content -->

  <!-- ── Status Bar ─────────────────────────────────────────────────────── -->
  <div id="status-bar">
    <span id="word-count">0 words</span>
    <span id="char-count">0 chars</span>
    <span id="page-count">Page 1 of 1</span>
    <span id="reading-time">~1 min read</span>
    <span id="keystroke-count">0 keystrokes</span>
    <span id="typing-speed">0 wpm</span>
    <span id="timer">00:00</span>
    <span id="word-count-detail"></span>
    <span id="readability-score"></span>
    <span id="smart-typo-indicator"></span>
    <!-- Word goal area -->
    <span id="word-goal-area">
      <button id="word-goal-set-btn" title="Set word count goal">Goal</button>
      <span id="word-goal-input-wrap">
        <input id="word-goal-input" type="number" min="1" placeholder="e.g. 500" />
        <button id="word-goal-ok">OK</button>
        <button id="word-goal-cancel">&#x2715;</button>
      </span>
      <span id="word-goal-progress">
        <span id="word-goal-label"></span>
        <span id="word-goal-bar-wrap"><span id="word-goal-bar"></span></span>
        <button id="word-goal-clear" title="Clear goal">&#x2715;</button>
      </span>
    </span>
    <span id="save-status">Not saved</span>
  </div>

  <!-- ── Shortcut Panel ─────────────────────────────────────────────────── -->
  <div id="shortcut-panel">
    <div class="shortcut-box">
      <h2>Keyboard Shortcuts</h2>
      <div id="shortcut-content"></div>
      <button id="shortcut-close">Close</button>
    </div>
  </div>

  <div id="help-panel">
    <div class="help-box">
      <h2 id="help-title">Help</h2>
      <div id="help-content"></div>
      <div class="help-actions">
        <button id="help-primary" class="primary" style="display:none"></button>
        <button id="help-close">Close</button>
      </div>
    </div>
  </div>

  <!-- ── Link Dialog ──────────────────────────────────────────────────── -->
  <div id="link-dialog">
    <div class="link-dialog-box">
      <div class="link-dialog-header">
        <h3 id="link-dialog-title">Insert Link</h3>
        <button id="link-dialog-close" title="Close">&times;</button>
      </div>
      <div class="link-dialog-field">
        <label for="link-url">URL</label>
        <input type="url" id="link-url" placeholder="https://example.com" autocomplete="off" spellcheck="false" />
      </div>
      <div class="link-dialog-field">
        <label for="link-text">Display text</label>
        <input type="text" id="link-text" placeholder="Link text" autocomplete="off" />
      </div>
      <div class="link-dialog-actions">
        <button id="link-dialog-insert">Insert</button>
        <button id="link-dialog-remove" style="display:none">Remove link</button>
        <button id="link-dialog-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ── Special Characters Dialog ────────────────────────────────────── -->
  <div id="special-chars-dialog">
    <div class="sc-box">
      <h2>Insert Special Character</h2>
      <input type="text" id="sc-search" placeholder="Search characters…" autocomplete="off" spellcheck="false" />
      <div id="sc-recent" style="display:none">
        <div id="sc-recent-label">Recently Used</div>
        <div class="sc-grid" id="sc-recent-grid"></div>
      </div>
      <div id="sc-body"></div>
      <button id="sc-close">Close</button>
    </div>
  </div>

  <script type="module" src="/src/editor.js"></script>
</body>
</html>
